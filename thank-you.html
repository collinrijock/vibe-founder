<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — HENRY VENDING LTD.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated gradient background ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(120, 80, 255, .35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255, 100, 180, .25) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 70%, rgba(60, 200, 255, .20) 0%, transparent 50%),
        #0a0a0f;
      animation: pulseGradient 8s ease-in-out infinite alternate;
    }

    @keyframes pulseGradient {
      0%   { opacity: .9; transform: scale(1); }
      100% { opacity: 1;  transform: scale(1.05); }
    }

    /* ── Floating orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .4;
      z-index: 0;
      animation: floatOrb 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      top: -10%; left: -5%;
      animation-duration: 14s;
    }

    .orb-2 {
      width: 300px; height: 300px;
      background: linear-gradient(135deg, #ec4899, #f97316);
      bottom: -8%; right: -5%;
      animation-duration: 10s;
      animation-delay: -3s;
    }

    .orb-3 {
      width: 250px; height: 250px;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      top: 60%; left: 60%;
      animation-duration: 16s;
      animation-delay: -7s;
    }

    @keyframes floatOrb {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.15); }
    }

    /* ── Sparkle particles ── */
    .sparkles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--dur) var(--delay) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(.5); }
      50%      { opacity: .8; transform: scale(1); }
    }

    /* ── Confetti ── */
    .confetti-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      top: -20px;
      width: 10px; height: 10px;
      opacity: .7;
      animation: confettiFall var(--dur) var(--delay) linear infinite;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: .8; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* ── Main card ── */
    .card-wrapper {
      position: relative;
      z-index: 2;
      max-width: 560px;
      width: 90%;
      padding: 3px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(124, 58, 237, .6), rgba(236, 72, 153, .6), rgba(59, 130, 246, .6));
      animation: cardEntry .8s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes cardEntry {
      0%   { opacity: 0; transform: translateY(40px) scale(.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      background: rgba(15, 15, 25, .85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 26px;
      padding: 56px 40px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── Checkmark circle ── */
    .check-circle {
      width: 88px; height: 88px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(124, 58, 237, .4), 0 0 80px rgba(59, 130, 246, .2);
      animation: checkPop .6s .3s cubic-bezier(.34, 1.56, .64, 1) both;
    }

    @keyframes checkPop {
      0%   { opacity: 0; transform: scale(0); }
      100% { opacity: 1; transform: scale(1); }
    }

    .check-circle svg {
      width: 40px; height: 40px;
      stroke: #fff;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .check-circle svg path {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck .5s .7s ease forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* ── Typography ── */
    .heading {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #e0e7ff 0%, #c4b5fd 40%, #f9a8d4 70%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp .6s .5s ease both;
    }

    .subheading {
      font-size: 1.05rem;
      font-weight: 400;
      color: rgba(255, 255, 255, .55);
      line-height: 1.6;
      margin-bottom: 36px;
      animation: fadeUp .6s .65s ease both;
    }

    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── Divider ── */
    .divider {
      width: 60%;
      height: 1px;
      margin: 0 auto 28px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      animation: fadeUp .6s .75s ease both;
    }

    /* ── Company name ── */
    .company {
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .35);
      animation: fadeUp .6s .85s ease both;
    }

    /* ── Ring decoration ── */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .06);
      pointer-events: none;
    }

    .ring-1 {
      width: 300px; height: 300px;
      top: -100px; right: -80px;
    }

    .ring-2 {
      width: 200px; height: 200px;
      bottom: -60px; left: -60px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 44px 24px 36px; }
      .heading { font-size: 1.7rem; }
      .check-circle { width: 72px; height: 72px; }
      .check-circle svg { width: 32px; height: 32px; }
    }
  </style>
</head>
<body>

  <div class="bg-gradient"></div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="sparkles" id="sparkles"></div>
  <div class="confetti-container" id="confetti"></div>

  <div class="card-wrapper">
    <div class="card">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>

      <div class="check-circle">
        <svg viewBox="0 0 40 40">
          <path d="M10 20 L17 27 L30 13" />
        </svg>
      </div>

      <h1 class="heading">Thank You for<br>Your Purchase!</h1>
      <p class="subheading">Your order has been confirmed. We appreciate your business and hope you enjoy every sip.</p>

      <div class="divider"></div>

      <p class="company">Henry Vending Ltd.</p>
    </div>
  </div>

  <script>
    // Generate sparkle particles
    const sparklesEl = document.getElementById('sparkles');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
      s.style.setProperty('--delay', (Math.random() * 5) + 's');
      s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
      sparklesEl.appendChild(s);
    }

    // Generate confetti
    const confettiEl = document.getElementById('confetti');
    const colors = ['#7c3aed', '#3b82f6', '#ec4899', '#f97316', '#06b6d4', '#fbbf24', '#34d399'];
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.setProperty('--dur', (4 + Math.random() * 6) + 's');
      c.style.setProperty('--delay', (Math.random() * 6) + 's');
      c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      confettiEl.appendChild(c);
    }
  </script>

</body>
</html>
